;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Fulcrum — development php.ini
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

;;
;; Errors
;; Full visibility in dev, no surprises
;;
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php/error.log

;;
;; Limits
;;
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
max_input_vars = 3000
post_max_size = 50M
upload_max_filesize = 50M
max_file_uploads = 20

;;
;; Opcache
;; Enabled but revalidates every request
;; so code changes are picked up immediately
;; without restarting the container
;;
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
opcache.save_comments = 1

;;
;; Date
;;
date.timezone = UTC

;;
;; Sessions
;; File-based for now
;; Redis sessions come later when
;; the Redis container is added
;;
session.save_handler = files
session.save_path = /var/www/fulcrum/storage/sessions
session.gc_maxlifetime = 86400
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1
session.name = fulcrum_session

;;
;; Security
;; Good habits from day one
;;
expose_php = Off
allow_url_fopen = Off
allow_url_include = Off

;;
;; Xdebug
;; Points to host.docker.internal
;; which routes back to VSCode on WSL2
;;
xdebug.mode = debug
xdebug.start_with_request = yes
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.max_nesting_level = 512
xdebug.log_level = 0
xdebug.idekey = VSCODE