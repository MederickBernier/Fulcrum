# Fulcrum — development nginx config

upstream fulcrum_php {
    server php:9000;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/fulcrum/public;
    index index.php;

    charset utf-8;

    access_log /var/log/nginx/fulcrum_access.log;
    error_log  /var/log/nginx/fulcrum_error.log warn;

    client_max_body_size 50M;

    #
    # Block sensitive files
    #
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(composer\.json|composer\.lock|\.env)$ {
        deny all;
    }

    #
    # Static assets
    #
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    #
    # Everything goes through index.php
    #
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    #
    # PHP-FPM
    #
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass              fulcrum_php;
        fastcgi_index             index.php;
        fastcgi_param             SCRIPT_FILENAME $realpath_root$fastcgi_script_name;

        include                   fastcgi_params;

        fastcgi_connect_timeout   60s;
        fastcgi_send_timeout      60s;
        fastcgi_read_timeout      60s;

        fastcgi_buffer_size       128k;
        fastcgi_buffers           4 256k;
        fastcgi_busy_buffers_size 256k;

        fastcgi_hide_header       X-Powered-By;
    }

    #
    # Health check
    #
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    #
    # Suppress common 404s
    #
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
}