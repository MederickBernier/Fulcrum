name: fulcrum

services:

  php:
    build:
      context: .docker/php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: fulcrum_php
    restart: unless-stopped
    working_dir: /var/www/fulcrum
    volumes:
      - .:/var/www/fulcrum
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/fulcrum.ini
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fulcrum}
      DB_USER: ${DB_USER:-fulcrum}
      DB_PASSWORD: ${DB_PASSWORD:-fulcrum}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fulcrum

  nginx:
    build:
      context: .docker/nginx
      dockerfile: Dockerfile
    container_name: fulcrum_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/fulcrum
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - fulcrum

  postgres:
    image: postgres:16-alpine
    container_name: fulcrum_postgres
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-fulcrum}
      POSTGRES_USER: ${DB_USER:-fulcrum}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fulcrum}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - fulcrum_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fulcrum} -d ${DB_NAME:-fulcrum}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fulcrum

  mailpit:
    image: axllent/mailpit:latest
    container_name: fulcrum_mailpit
    restart: unless-stopped
    ports:
      - "${MAIL_UI_PORT:-8025}:8025"
      - "${MAIL_SMTP_PORT:-1025}:1025"
    networks:
      - fulcrum

volumes:
  fulcrum_postgres:
    driver: local

networks:
  fulcrum:
    driver: bridge